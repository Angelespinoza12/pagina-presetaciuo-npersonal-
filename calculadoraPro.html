<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Ubuntu&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --accent: #22c55e;
            --accent2: #a78bfa;
            --text: #e5e7eb;
        }

        body {
            background: radial-gradient(circle, #594d85, #020617);
            font-family: 'Ubuntu', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .calc-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .display-box {
            background: black;
            border-radius: 15px;
            padding: 15px;
            text-align: right;
            margin-bottom: 20px;
        }

        #pantalla {
            font-size: 2.5rem;
            color: var(--accent);
            font-family: 'Roboto Mono', monospace;
        }

        #expresion {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
        }

        .num {
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .num::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
        }

        .num span {
            position: relative;
            z-index: 2;
        }

        .op {
            background: #5198ad;
        }

        .c {
            background: #e91717;
        }

        .eq {
            background: #13e3f1;
            color: black;
            grid-column: span 2;
        }

        .func {
            grid-column: span 2;
            background: #334155;
            height: 50px;
            font-size: 0.9rem;
        }

    <script>
        let a = '', b = '', op = '', reset = false;
        const p = document.getElementById('pantalla');
        const e = document.getElementById('expresion');

        function render() {
            p.innerText = (op == '' ? a : b) || '0';
            e.innerText = op == '' ? '' : `${a} ${op} ${b}`;
        }

        function num(n) {
            if (reset) { a = ''; b = ''; op = ''; reset = false; }
            if (op == '') a += n; else b += n;
            render();
        }

        function punto() {
            if (op == '') { if (!a.includes('.')) a += (a == '' ? '0.' : '.'); }
            else { if (!b.includes('.')) b += (b == '' ? '0.' : '.'); }
            render();
        }

        function setOp(o) {
            if (a == '') a = '0';
            if (b != '') igual();
            op = o; reset = false;
            render();
        }

        function igual() {
            if (a == '' || b == '' || op == '') return;
            let n1 = parseFloat(a), n2 = parseFloat(b), r = 0;
            if (op == '+') r = n1 + n2;
            if (op == '-') r = n1 - n2;
            if (op == '*') r = n1 * n2;
            if (op == '/') r = n2 != 0 ? n1 / n2 : 'Error';
            if (op == '%') r = n1 % n2;
            a = String(r); b = ''; op = ''; reset = true;
            render();
        }

        function limpiar() { a = ''; b = ''; op = ''; reset = false; render(); }
        function borrar() { if (op == '') a = a.slice(0, -1); else b = b.slice(0, -1); render(); }

        function mostrarResultado(txt) {
            p.innerText = txt;
            e.innerText = "Resultado";
            reset = true;
        }
        function raiz() {
            let n = parseFloat(p.innerText);
            if (n < 0) return mostrarResultado("Error");
            mostrarResultado(Math.sqrt(n));
        }

        function potencia() {
            let n = parseFloat(p.innerText);
            mostrarResultado(n * n);
        }

        function seno() {
            let n = parseFloat(p.innerText);
            let r = Math.sin(n * Math.PI / 180);
            mostrarResultado(r.toFixed(4));
        }

        function cubica() {
            let n = parseFloat(p.innerText);
            mostrarResultado(Math.cbrt(n));
        }
    </script>
